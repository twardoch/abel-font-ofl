name: Validate fonts

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fontTools
        run: python -m pip install --upgrade "fonttools>=4.50"

      - name: Validate font binaries (parse + name/OFL sanity)
        run: python tests/validate_fonts.py
